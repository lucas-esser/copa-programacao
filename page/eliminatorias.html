<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eliminatórias Sul-Americanas — Tempo Real</title>

  <!-- Estilo externo -->
  <link rel="stylesheet" href="../css/style-eliminatorias.css" />
</head>
<body>

  <div class="container">

    <h1>🏆 Eliminatórias Sul-Americanas</h1>
    <p class="subtitle">CONMEBOL — Copa do Mundo 2026</p>

    <!-- Barra de status da atualização -->
    <div class="status-bar">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">Carregando...</span>
      <span id="countdown"></span>
    </div>

    <!-- Tabela gerada dinamicamente pelo JavaScript -->
    <div id="table-wrapper">
      <p id="loading-msg">⏳ Buscando dados em tempo real...</p>
    </div>

    <!-- Legenda de cores -->
    <div class="legend">
      <span><span class="legend-dot" style="background:#22c55e"></span> Classificação direta (Top 6)</span>
      <span><span class="legend-dot" style="background:#f59e0b"></span> Repescagem (7º)</span>
      <span><span class="legend-dot" style="background:#ef4444"></span> Eliminado</span>
    </div>

  </div>

  <!-- Script externo de lógica -->
  <script src="../js/script-eliminatorias.js"></script>

</body>
</html>
